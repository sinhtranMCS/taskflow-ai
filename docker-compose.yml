services:
  mongodb:
    image: mongo:7
    container_name: taskflow-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow-ai
    networks:
      - taskflow-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/taskflow-ai
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before running docker compose}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - taskflow-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - taskflow-network

volumes:
  mongo_data:

networks:
  taskflow-network:
    driver: bridge
